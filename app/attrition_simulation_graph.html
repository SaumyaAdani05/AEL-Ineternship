<!DOCTYPE html>
<html lang="en" class="bg-[#F8F9FA] text-gray-800 h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attrition Headcount Forecaster - Graph</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Custom Styles */
    .card {
      background: white;
      border-radius: 1.25rem;
      border: 1px solid #F1F5F9;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
    }

    .btn-outline {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border: 1px solid #E2E8F0;
      border-radius: 0.75rem;
      font-weight: 500;
      font-size: 0.875rem;
      color: #475569;
      background: white;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-outline:hover {
      background-color: #F8FAFC;
      border-color: #CBD5E1;
    }
  </style>
</head>

<body class="flex h-full overflow-hidden">

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
    <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center max-w-sm text-center">
      <div class="w-12 h-12 border-4 border-orange-200 border-t-orange-500 rounded-full animate-spin mb-4"></div>
      <h3 class="text-xl font-bold text-slate-800">Running Simulation...</h3>
      <p class="text-sm text-slate-500 mt-2">Simulating scenarios and calculating headcount month over month.</p>
    </div>
  </div>

  <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">

    <!-- Top Nav -->
    <header class="h-16 flex items-center justify-between px-8 bg-transparent shrink-0 pt-4">
      <h1 class="text-lg font-bold text-slate-800">Attrition Headcount Forecaster</h1>
      <div class="flex items-center gap-3">
        <a href="/" class="px-4 py-2 text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-lg shadow-sm hover:bg-slate-50 transition-colors">← Dashboard</a>
        <a href="/dashboard/org-network" class="px-4 py-2 text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-lg shadow-sm hover:bg-slate-50 transition-colors">Org Network Graph</a>
        <a href="/dashboard/attrition-simulation" class="px-4 py-2 text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-lg shadow-sm hover:bg-slate-50 transition-colors">Data Table</a>
      </div>
    </header>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto p-8 pt-4 flex flex-col h-full">

      <!-- Controls Card -->
      <div class="card p-6 mb-6 shrink-0">
        <div class="flex items-end gap-6 flex-wrap">
          <!-- n_sims -->
          <div>
            <label for="n-sims" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Scenarios to Run</label>
            <input type="number" id="n-sims" value="10000" min="1" max="100000" step="1000"
              class="w-40 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-orange-500 transition-colors shadow-sm">
          </div>
          
          <!-- starting_headcount -->
          <div>
            <label for="starting-headcount" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Starting Headcount</label>
            <input type="number" id="starting-headcount" value="1489" min="1" step="1"
              class="w-40 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-orange-500 transition-colors shadow-sm">
          </div>

          <!-- rate_lo -->
          <div>
            <label for="rate-lo" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Min Rate (%)</label>
            <input type="number" id="rate-lo" value="5" min="0" max="100" step="1"
              class="w-24 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-orange-500 transition-colors shadow-sm">
          </div>

          <!-- rate_hi -->
          <div>
            <label for="rate-hi" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Max Rate (%)</label>
            <input type="number" id="rate-hi" value="15" min="0" max="100" step="1"
              class="w-24 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-orange-500 transition-colors shadow-sm">
          </div>

          <!-- Run Button -->
          <button id="run-btn" onclick="runSimulation()"
            class="px-5 py-2.5 bg-orange-600 text-white text-sm font-semibold rounded-lg shadow-sm hover:bg-orange-700 transition-colors flex items-center gap-2">
            <span id="btn-text">Run Simulation</span>
          </button>
          
          <a href="/dashboard/attrition-simulation" class="btn-outline ml-auto">
            View Data Table
          </a>
        </div>
        <p class="text-xs text-slate-400 mt-3" id="warning-text">Simulates possible future headcount trajectories over 12 months.</p>
      </div>

      <!-- Stats Row -->
      <div class="flex items-center justify-between mb-4 shrink-0">
        <h2 class="text-lg font-semibold text-slate-800">Trajectory Graph</h2>
        <div id="stats-summary" class="text-sm text-slate-500"></div>
      </div>

      <!-- Chart Card -->
      <div class="card p-6 flex-1 min-h-[400px]">
        <canvas id="simChart"></canvas>
      </div>
      
    </div>
  </main>

  <script>
    let simChart = null;

    // Helper to calculate percentile from an array of numbers
    function percentile(arr, p) {
        if (arr.length === 0) return 0;
        if (typeof p !== 'number') throw new TypeError('p must be a number');
        if (p <= 0) return arr[0];
        if (p >= 1) return arr[arr.length - 1];
        const index = (arr.length - 1) * p;
        const lower = Math.floor(index);
        const upper = lower + 1;
        const weight = index % 1;
        if (upper >= arr.length) return arr[lower];
        return arr[lower] * (1 - weight) + arr[upper] * weight;
    }

    async function runSimulation() {
      const nSims = parseInt(document.getElementById('n-sims').value) || 10000;
      const startHeadcount = parseInt(document.getElementById('starting-headcount').value) || 1489;
      const rateLo = (parseFloat(document.getElementById('rate-lo').value) || 5) / 100.0;
      const rateHi = (parseFloat(document.getElementById('rate-hi').value) || 15) / 100.0;

      if (nSims < 1 || nSims > 100000) {
        alert('Scenarios must be between 1 and 100,000.');
        return;
      }
      if (rateLo < 0 || rateHi > 1 || rateLo >= rateHi) {
        alert('Invalid rates. Min Rate must be less than Max Rate and between 0 and 100.');
        return;
      }
      
      const warningText = document.getElementById('warning-text');
      if (nSims > 50000) {
        warningText.innerHTML = '<span class="text-orange-500 font-semibold">Warning: Large payload. Fetching might take a few seconds.</span>';
      } else {
        warningText.innerHTML = 'Simulates possible future headcount trajectories over 12 months.';
      }

      document.getElementById('loading-overlay').classList.remove('hidden');

      try {
        const resp = await fetch('/api/simulate/attrition-distribution', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            n_sims: nSims,
            starting_headcount: startHeadcount,
            rate_lo: rateLo,
            rate_hi: rateHi
          }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          alert(`Error: ${err.detail || resp.statusText}`);
          return;
        }

        const data = await resp.json();
        
        // Update Stats text
        const stats = data.stats;
        document.getElementById('stats-summary').innerHTML =
          `<span class="font-semibold text-slate-700">Mean Final Headcount: ${stats.mean.toFixed(1)}</span>` +
          `<span class="mx-2 text-slate-300">|</span>` +
          `<span>Median: ${stats.p50.toFixed(1)}</span>` +
          `<span class="mx-2 text-slate-300">|</span>` +
          `<span>10th-90th Percentile: [${stats.p10.toFixed(1)}, ${stats.p90.toFixed(1)}]</span>` +
          `<span class="mx-2 text-slate-300">|</span>` +
          `<span>Min/Max: ${stats.min} - ${stats.max}</span>`;

        renderChart(data.scenarios);
      } catch (e) {
        alert(`Network error: ${e.message}`);
      } finally {
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }

    function renderChart(scenarios) {
      if (simChart) {
        simChart.destroy();
      }

      const ctx = document.getElementById('simChart').getContext('2d');
      
      const labels = ['Month 0', 'Month 1', 'Month 2', 'Month 3', 'Month 4', 'Month 5', 'Month 6', 'Month 7', 'Month 8', 'Month 9', 'Month 10', 'Month 11', 'Month 12'];
      
      // Calculate Percentiles per month
      const p10_data = [];
      const p50_data = [];
      const p90_data = [];
      
      for(let m = 0; m <= 12; m++) {
          const monthVals = scenarios.map(s => s.headcounts[m]).sort((a,b) => a-b);
          p10_data.push(percentile(monthVals, 0.10));
          p50_data.push(percentile(monthVals, 0.50));
          p90_data.push(percentile(monthVals, 0.90));
      }

      // Random sample of 100 scenarios for background lines
      const MAX_LINES = 100;
      const step = Math.max(1, Math.floor(scenarios.length / MAX_LINES));
      const sampleLines = [];
      
      for(let i = 0; i < scenarios.length; i += step) {
          if (sampleLines.length >= MAX_LINES) break;
          sampleLines.push({
            label: `Scenario ${scenarios[i].id}`,
            data: scenarios[i].headcounts,
            borderColor: 'rgba(203, 213, 225, 0.2)', // slate-300 with low opacity
            borderWidth: 1,
            fill: false,
            pointRadius: 0,
            pointHoverRadius: 0,
            tension: 0.1
          });
      }

      // Add bold trendlines on top
      const datasets = [
        ...sampleLines,
        {
          label: 'Worst Case (10th %ile)',
          data: p10_data,
          borderColor: 'rgba(220, 38, 38, 0.8)', // red-600
          borderWidth: 3,
          borderDash: [5, 5],
          fill: false,
          pointRadius: 2,
          tension: 0.1
        },
        {
          label: 'Best Case (90th %ile)',
          data: p90_data,
          borderColor: 'rgba(22, 163, 74, 0.8)', // green-600
          borderWidth: 3,
          borderDash: [5, 5],
          fill: false,
          pointRadius: 2,
          tension: 0.1
        },
        {
          label: 'Median (50th %ile)',
          data: p50_data,
          borderColor: 'rgba(234, 88, 12, 1)', // orange-600
          borderWidth: 4,
          fill: false,
          pointRadius: 3,
          tension: 0.1
        }
      ];

      simChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false,
          },
          plugins: {
            legend: {
              display: true,
              labels: {
                filter: function(item, chart) {
                  // Only show legend for the trendlines, hide the 100 sample lines
                  return !item.text.startsWith('Scenario');
                }
              }
            },
            tooltip: {
              filter: function(tooltipItem) {
                // Only show tooltip for trendlines
                return !tooltipItem.dataset.label.startsWith('Scenario');
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: 'Headcount'
              }
            }
          }
        }
      });
    }

    // Auto-run on load
    window.onload = () => {
      runSimulation();
    };
  </script>

</body>
</html>
