<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f8fafc"/>
  <style>
    .title{font:700 30px Arial;fill:#172033}.sub{font:14px Arial;fill:#526071}.group{fill:#2f3b4d;stroke:#1d2735;stroke-width:1.5;rx:8}.box{fill:#fff7d6;stroke:#e59e25;stroke-width:2;rx:6}.green{fill:#dcfce7;stroke:#22c55e}.blue{fill:#dbeafe;stroke:#2563eb}.pink{fill:#ffe4ec;stroke:#f43f5e}.mint{fill:#ccfbf1;stroke:#14b8a6}.text{font:15px Arial;fill:#7c3b12}.darkText{font:700 15px Arial;fill:#d4d4d8}.small{font:12px Arial;fill:#334155}.label{font:700 12px Arial;fill:#fff}.arrow{stroke:#f0b24a;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:5 5}.note{font:12px Arial;fill:#7c2d12}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#f0b24a"/></marker></defs>
  <text x="40" y="46" class="title">Current HR Attrition Architecture</text>
  <text x="40" y="72" class="sub">ETL, survival ML, report generation, graph export, FastAPI dashboard, and optional Neo4j sidecar.</text>

  <rect x="60" y="100" width="320" height="145" class="group"/><text x="205" y="125" class="darkText">Ops</text>
  <rect x="90" y="150" width="135" height="70" class="pink"/><text x="110" y="178" class="text">Pipeline runner</text><text x="112" y="200" class="text">run_pipeline.py</text>
  <rect x="245" y="142" width="110" height="82" class="pink"/><text x="263" y="168" class="text">Neo4j sidecar</text><text x="264" y="190" class="text">docker-compose</text><text x="282" y="212" class="text">graph db</text>

  <rect x="70" y="330" width="980" height="310" class="group"/><text x="540" y="356" class="darkText">Pipeline</text>
  <rect x="100" y="395" width="155" height="75" class="box"/><text x="133" y="423" class="text">Seed OLTP</text><text x="129" y="446" class="text">seed_db.py</text>
  <rect x="285" y="395" width="155" height="75" class="box"/><text x="318" y="423" class="text">SCD2 ETL</text><text x="334" y="446" class="text">etl.py</text>
  <rect x="470" y="395" width="170" height="75" class="box"/><text x="497" y="423" class="text">Graph export</text><text x="500" y="446" class="text">graph_exporter.py</text>
  <rect x="680" y="395" width="180" height="75" class="box"/><text x="715" y="423" class="text">Prod scoring</text><text x="713" y="446" class="text">production_ml.py</text>
  <rect x="890" y="395" width="130" height="75" class="box"/><text x="918" y="423" class="text">Reports</text><text x="911" y="446" class="text">report.py</text>
  <rect x="185" y="535" width="175" height="75" class="box"/><text x="221" y="563" class="text">HTML reports</text><text x="212" y="586" class="text">html_reporter.py</text>
  <rect x="620" y="535" width="185" height="75" class="box"/><text x="648" y="563" class="text">Model artifacts</text><text x="642" y="586" class="text">pkl + xgb json</text>

  <rect x="1100" y="360" width="230" height="130" class="group"/><text x="1180" y="385" class="darkText">Legacy</text>
  <rect x="1140" y="415" width="150" height="55" class="blue"/><text x="1162" y="438" class="small">Reference archive</text><text x="1168" y="458" class="small">legacy/</text>

  <rect x="540" y="690" width="405" height="150" class="group"/><text x="700" y="715" class="darkText">Data Layer</text>
  <rect x="570" y="745" width="115" height="70" class="blue"/><text x="588" y="773" class="small">Raw CSV</text><text x="582" y="795" class="small">datasets.csv</text>
  <rect x="705" y="735" width="115" height="88" class="blue"/><text x="723" y="768" class="small">OLTP DB</text><text x="718" y="790" class="small">oltp_hr.db</text>
  <rect x="840" y="735" width="85" height="88" class="blue"/><text x="855" y="768" class="small">OLAP</text><text x="850" y="790" class="small">warehouse</text>

  <rect x="1040" y="680" width="250" height="130" class="group"/><text x="1138" y="705" class="darkText">Graph Files</text>
  <rect x="1070" y="735" width="190" height="55" class="blue"/><text x="1095" y="758" class="small">nodes + edge CSVs</text><text x="1087" y="778" class="small">manager, role, tenure</text>

  <rect x="160" y="690" width="260" height="120" class="group"/><text x="265" y="715" class="darkText">Reports</text>
  <rect x="185" y="745" width="100" height="45" class="mint"/><text x="200" y="772" class="small">Technical</text>
  <rect x="300" y="745" width="95" height="45" class="mint"/><text x="317" y="772" class="small">Business</text>

  <rect x="565" y="75" width="280" height="120" class="group"/><text x="675" y="100" class="darkText">App Layer</text>
  <rect x="590" y="125" width="105" height="50" class="green"/><text x="607" y="154" class="small">FastAPI</text>
  <rect x="720" y="125" width="100" height="50" class="green"/><text x="742" y="154" class="small">Dashboard</text>

  <path d="M158 220 V395" class="arrow"/><path d="M190 220 V295 H955 V395" class="arrow"/><path d="M225 185 H245" class="arrow"/>
  <path d="M570 125 H355 V142" class="arrow dash"/><path d="M695 175 V260 H177 V395" class="arrow"/>
  <path d="M255 432 H285" class="arrow"/><path d="M440 432 H470" class="arrow"/><path d="M640 432 H680" class="arrow"/><path d="M860 432 H890" class="arrow"/>
  <path d="M362 470 V535" class="arrow"/><path d="M955 470 V535 H805" class="arrow"/>
  <path d="M177 395 V305 H570 V125" class="arrow"/><path d="M760 175 V735" class="arrow"/>
  <path d="M555 470 V690 H1150 V735" class="arrow"/><path d="M1150 735 V224 H300" class="arrow dash"/>
  <path d="M910 470 V690 H290 V745" class="arrow"/><path d="M820 779 H840" class="arrow"/><path d="M840 735 V190 H720" class="arrow"/>
  <path d="M1200 415 V305 H705 V125" class="arrow dash"/>

  <text x="40" y="875" class="note">Graph exposure is contextual/runtime support. Production ML scores are written from XGBoost survival plus Cox PH theme contributions.</text>
</svg>
