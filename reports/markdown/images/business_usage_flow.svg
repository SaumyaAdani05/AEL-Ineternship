<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <rect width="1280" height="560" fill="#f8fafc"/>
  <style>.title{font:700 30px Arial;fill:#172033}.box{fill:#fff;stroke:#315f72;stroke-width:2;rx:8}.text{font:16px Arial;fill:#172033}.small{font:13px Arial;fill:#526071}.arrow{stroke:#315f72;stroke-width:3;fill:none;marker-end:url(#arrow)}.tag{font:700 12px Arial;fill:#1f7a6d}</style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#315f72"/></marker></defs>
  <text x="40" y="48" class="title">Updated Business Usage Flow - Dashboard to HR Action</text>
  <rect x="55" y="115" width="215" height="125" class="box"/><text x="85" y="145" class="tag">APP</text><text x="85" y="175" class="text">1. Open Dashboard</text><text x="85" y="205" class="small">app/dashboard.html</text><text x="85" y="226" class="small">served from app/server.py</text>
  <rect x="330" y="115" width="215" height="125" class="box"/><text x="360" y="145" class="tag">SUMMARY</text><text x="360" y="175" class="text">2. Read Stats</text><text x="360" y="205" class="small">/api/dashboard/stats</text><text x="360" y="226" class="small">1,489 scored employees</text>
  <rect x="605" y="115" width="215" height="125" class="box"/><text x="635" y="145" class="tag">PRIORITIZE</text><text x="635" y="175" class="text">3. Filter Risk</text><text x="635" y="205" class="small">department/status/search</text><text x="635" y="226" class="small">sort by risk score</text>
  <rect x="880" y="115" width="215" height="125" class="box"/><text x="910" y="145" class="tag">DIAGNOSE</text><text x="910" y="175" class="text">4. Open Employee</text><text x="910" y="205" class="small">risk curve + drivers</text><text x="910" y="226" class="small">theme contribution bars</text>
  <rect x="330" y="350" width="255" height="125" class="box"/><text x="360" y="380" class="tag">WHAT-IF</text><text x="360" y="410" class="text">5. Test Scenario</text><text x="360" y="440" class="small">/api/whatif</text><text x="360" y="461" class="small">salary, overtime, manager, role</text>
  <rect x="695" y="350" width="300" height="125" class="box"/><text x="725" y="380" class="tag">COMMIT</text><text x="725" y="410" class="text">6. Simulate and Re-score</text><text x="725" y="440" class="small">/api/simulate-action</text><text x="725" y="461" class="small">ETL + production ML refresh warehouse</text>
  <path d="M270 178 H330" class="arrow"/><path d="M545 178 H605" class="arrow"/><path d="M820 178 H880" class="arrow"/><path d="M987 240 V300 H457 V350" class="arrow"/><path d="M585 412 H695" class="arrow"/>
</svg>
